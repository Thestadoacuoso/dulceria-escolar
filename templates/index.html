<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sugar Dash | Carrito Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        :root{
            --sd-orange-1:#ff9a3c;
            --sd-orange-2:#ff7a1a;
            --sd-orange-3:#ffb76b;
            --sd-blue-1:#173b78;
            --sd-blue-2:#2457a6;
            --sd-blue-3:#eaf2ff;
            --sd-cream:#fffaf4;
            --sd-line:#fde7d2;
            --sd-text:#183153;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 183, 107, 0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(36, 87, 166, 0.10), transparent 24%),
                linear-gradient(180deg, #ffffff 0%, #fffaf4 100%);
            color: var(--sd-text);
        }

        .glass {
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(253, 231, 210, 0.95);
        }

        .gradient-text {
            background: linear-gradient(90deg, var(--sd-orange-2) 0%, var(--sd-orange-1) 55%, var(--sd-blue-2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .product-card {
            transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.92);
            border: 1px solid #f6e4d4;
            box-shadow: 0 10px 26px rgba(23, 59, 120, 0.06);
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 34px rgba(23, 59, 120, 0.10);
            border-color: #ffd2a4;
        }

        .btn-float {
            animation: slideUp 0.3s ease-out;
        }

        .hero-card {
            background: linear-gradient(135deg, var(--sd-orange-2) 0%, var(--sd-orange-1) 55%, #ffbe73 100%);
            box-shadow: 0 18px 40px rgba(255, 122, 26, 0.28);
        }

        .btn-add {
            background: linear-gradient(135deg, var(--sd-blue-1) 0%, var(--sd-blue-2) 100%);
            box-shadow: 0 10px 20px rgba(36, 87, 166, 0.22);
        }

        .btn-add:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .btn-cart {
            background: linear-gradient(135deg, var(--sd-orange-2) 0%, var(--sd-orange-1) 100%);
            box-shadow: 0 18px 34px rgba(255, 122, 26, 0.30);
        }

        .btn-cart:hover,
        .btn-primary:hover {
            filter: brightness(1.03);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--sd-orange-2) 0%, var(--sd-orange-1) 100%);
            box-shadow: 0 14px 28px rgba(255, 122, 26, 0.24);
        }

        .price-text {
            color: var(--sd-blue-1);
        }

        .soft-input {
            background: #fffaf6;
            border: 2px solid #f7e6d6;
            color: var(--sd-text);
        }

        .soft-input:focus {
            border-color: var(--sd-orange-1);
            box-shadow: 0 0 0 4px rgba(255, 154, 60, 0.12);
        }

        .checkout-item {
            background: #fffaf6;
            border: 1px solid #f6e4d4;
        }

        .payment-active {
            border-color: var(--sd-orange-1) !important;
            background: #fff2e4 !important;
            color: var(--sd-orange-2) !important;
        }

        .badge-soft {
            background: #eef4ff;
            color: var(--sd-blue-2);
        }

        .icon-shell {
            background: linear-gradient(135deg, #fff1e3 0%, #ffe1bf 100%);
            color: var(--sd-orange-2);
            box-shadow: inset 0 0 0 1px rgba(255, 154, 60, 0.18);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="sticky top-0 z-40 glass px-6 py-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tight gradient-text">SUGAR DASH</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.24em]">
                    Dulce • Rápido • Aldo
                </p>
            </div>
            <div class="icon-shell p-2.5 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-6 pb-32">
        <div class="hero-card rounded-3xl p-6 mb-8 text-white relative overflow-hidden">
            <div class="absolute -right-8 -top-8 w-28 h-28 rounded-full bg-white/10"></div>
            <div class="absolute right-8 bottom-0 w-20 h-20 rounded-full bg-white/10"></div>
            <div class="relative z-10">
                <h2 class="text-xl font-extrabold mb-1">¿Qué se te antoja? 🍬</h2>
                <p class="text-white/90 text-sm">Arma tu carrito y te lo llevo a tu salón.</p>
            </div>
        </div>

        <div class="grid gap-4">
            {% for p in productos %}
            <div class="product-card p-4 rounded-[2rem] flex items-center justify-between {{ 'opacity-50 grayscale pointer-events-none' if not p.disponible }}">
                <div class="flex-1 pr-4">
                    <h3 class="font-bold text-slate-800 text-lg leading-tight">{{ p.nombre }}</h3>
                    <p class="price-text font-extrabold text-xl mt-1">${{ p.precio }}</p>
                </div>

                {% if p.disponible %}
                <button
                    onclick='prepararItem({{ p.nombre|tojson }}, {{ p.precio|tojson }}, {{ p.sabores|tojson }})'
                    class="btn-add text-white px-5 py-3 rounded-2xl font-bold text-sm transition active:scale-95">
                    + Añadir
                </button>
                {% else %}
                <span class="text-rose-500 font-bold text-sm px-4 py-2">Agotado</span>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </main>

    <div id="btnVerCarrito" class="fixed bottom-6 left-0 right-0 px-6 z-40 hidden btn-float">
        <button onclick="abrirCheckout()" class="btn-cart max-w-md mx-auto w-full text-white py-5 rounded-[2rem] font-black text-lg flex justify-between items-center px-8 transition active:scale-95">
            <span>VER CARRITO</span>
            <span id="badgeCarrito" class="bg-white text-[#ff7a1a] px-3 py-1 rounded-full text-sm">0</span>
        </button>
    </div>

    <div id="modalSabor" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/55 backdrop-blur-sm" onclick="cerrarModalSabor()"></div>
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 relative z-10 shadow-2xl border border-[#f7e6d6]">
            <h3 id="saborTitulo" class="text-2xl font-black text-slate-800 mb-4 text-center">Elegir Sabor</h3>
            <select id="selectSabor" class="soft-input w-full p-4 rounded-2xl outline-none font-semibold mb-6">
                <option value="">Selecciona sabor...</option>
            </select>
            <button onclick="confirmarAñadir()" class="btn-primary w-full text-white py-4 rounded-2xl font-bold text-lg">
                Agregar al Carrito
            </button>
        </div>
    </div>

    <div id="modalCheckout" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/55 backdrop-blur-sm" onclick="cerrarCheckout()"></div>
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 relative z-10 shadow-2xl overflow-y-auto max-h-[90vh] border border-[#f7e6d6]">
            <div class="w-12 h-1.5 bg-orange-100 rounded-full mx-auto mb-6"></div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">Tu Pedido</h3>

            <div id="listaCarrito" class="mb-6 space-y-3 border-b border-[#f7e6d6] pb-4"></div>
            <p id="totalCheckout" class="price-text font-black text-xl mb-6 text-right"></p>

            <div class="space-y-4">
                <input
                    type="text"
                    id="inputNombre"
                    placeholder="Tu Nombre"
                    class="soft-input w-full p-4 rounded-2xl outline-none font-semibold"
                >

                <input
                    type="text"
                    id="inputPunto"
                    placeholder="Punto de entrega (Ej: Salón 201)"
                    class="soft-input w-full p-4 rounded-2xl outline-none font-semibold"
                >

                <input
                    type="text"
                    id="inputDescripcion"
                    placeholder="¿Cómo te reconozco? (Ej: Gorra roja, sudadera negra)"
                    class="soft-input w-full p-4 rounded-2xl outline-none font-semibold"
                >

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setPago('Efectivo 💵', this)" class="pago-btn p-4 border-2 border-[#f7e6d6] rounded-2xl font-bold text-sm text-slate-500 bg-white transition">
                        Efectivo
                    </button>
                    <button onclick="setPago('Transferencia 📱', this)" class="pago-btn p-4 border-2 border-[#f7e6d6] rounded-2xl font-bold text-sm text-slate-500 bg-white transition">
                        Transferencia
                    </button>
                </div>

                <button id="btnFinalizar" onclick="enviarTodo()" class="btn-primary w-full text-white py-4 rounded-2xl font-black text-lg transition">
                    ¡ENVIAR PEDIDO!
                </button>
            </div>
        </div>
    </div>

    <script>
        let carrito = [];
        let itemPendiente = null;
        let metodoPago = '';
        let estaEnviando = false;

        function prepararItem(nombre, precio, sabores) {
            itemPendiente = {
                nombre: nombre,
                precio: Number(precio) || 0,
                sabores: Array.isArray(sabores) ? sabores.filter(s => String(s).trim() !== '') : []
            };

            if (itemPendiente.sabores.length > 0) {
                const select = document.getElementById('selectSabor');
                const titulo = document.getElementById('saborTitulo');

                titulo.innerText = `Elegir sabor de ${itemPendiente.nombre}`;
                select.innerHTML = '<option value="">Selecciona sabor...</option>';

                itemPendiente.sabores.forEach(sabor => {
                    const option = document.createElement('option');
                    option.value = sabor;
                    option.textContent = sabor;
                    select.appendChild(option);
                });

                document.getElementById('modalSabor').classList.remove('hidden');
            } else {
                carrito.push({
                    nombre: itemPendiente.nombre,
                    precio: itemPendiente.precio
                });

                actualizarUI();
            }
        }

        function confirmarAñadir() {
            if (!itemPendiente) return;

            const select = document.getElementById('selectSabor');
            const sabor = select.value;
            const tieneSabores = Array.isArray(itemPendiente.sabores) && itemPendiente.sabores.length > 0;

            if (tieneSabores && !sabor) {
                alert("⚠️ Por favor elige un sabor.");
                return;
            }

            const nombreFinal = sabor
                ? `${itemPendiente.nombre} (${sabor})`
                : itemPendiente.nombre;

            carrito.push({
                nombre: nombreFinal,
                precio: itemPendiente.precio
            });

            actualizarUI();
            cerrarModalSabor();
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            actualizarUI();

            if (carrito.length === 0) {
                cerrarCheckout();
                return;
            }

            abrirCheckout();
        }

        function actualizarUI() {
            const btn = document.getElementById('btnVerCarrito');
            const badge = document.getElementById('badgeCarrito');

            if (carrito.length > 0) {
                btn.classList.remove('hidden');
                badge.innerText = carrito.length;
            } else {
                btn.classList.add('hidden');
                badge.innerText = '0';
            }
        }

        function abrirCheckout() {
            if (carrito.length === 0) return;

            const lista = document.getElementById('listaCarrito');
            const totalTxt = document.getElementById('totalCheckout');
            let total = 0;

            lista.innerHTML = "";

            carrito.forEach((item, index) => {
                const precio = Number(item.precio) || 0;
                total += precio;

                lista.innerHTML += `
                    <div class="checkout-item flex justify-between items-center p-3 rounded-xl">
                        <div class="flex-1">
                            <p class="font-bold text-slate-800 text-sm">${item.nombre}</p>
                            <p class="price-text font-bold text-xs">$${precio}</p>
                        </div>
                        <button onclick="eliminarDelCarrito(${index})" class="text-rose-500 p-2 hover:bg-rose-50 rounded-lg transition" title="Eliminar">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                `;
            });

            totalTxt.innerText = `Total: $${total}`;
            document.getElementById('modalCheckout').classList.remove('hidden');
        }

        function cerrarModalSabor() {
            document.getElementById('modalSabor').classList.add('hidden');
            document.getElementById('selectSabor').innerHTML = '<option value="">Selecciona sabor...</option>';
            itemPendiente = null;
        }

        function cerrarCheckout() {
            document.getElementById('modalCheckout').classList.add('hidden');
        }

        function setPago(metodo, btn) {
            metodoPago = metodo;

            document.querySelectorAll('.pago-btn').forEach(b => {
                b.classList.remove('payment-active');
                b.classList.add('border-[#f7e6d6]', 'text-slate-500');
            });

            btn.classList.remove('border-[#f7e6d6]', 'text-slate-500');
            btn.classList.add('payment-active');
        }

        function resetFormulario() {
            document.getElementById('inputNombre').value = '';
            document.getElementById('inputPunto').value = '';
            document.getElementById('inputDescripcion').value = '';
            metodoPago = '';

            document.querySelectorAll('.pago-btn').forEach(b => {
                b.classList.remove('payment-active');
                b.classList.add('border-[#f7e6d6]', 'text-slate-500');
            });
        }

        function enviarTodo() {
            if (estaEnviando || carrito.length === 0) return;

            const nombre = document.getElementById('inputNombre').value.trim();
            const punto = document.getElementById('inputPunto').value.trim();
            const desc = document.getElementById('inputDescripcion').value.trim();
            const btn = document.getElementById('btnFinalizar');

            if (!nombre || !punto || !metodoPago) {
                alert("⚠️ Completa tu nombre, punto de entrega y método de pago.");
                return;
            }

            estaEnviando = true;
            btn.innerText = "PROCESANDO...";
            btn.classList.add('opacity-50');

            fetch('/enviar_pedido', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    nombre_cliente: nombre,
                    productos: carrito,
                    punto: punto,
                    descripcion: desc || "Sin descripción física",
                    metodo_pago: metodoPago,
                    total: carrito.reduce((acc, item) => acc + (Number(item.precio) || 0), 0)
                })
            })
            .then(async (res) => {
                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    throw new Error(data.error || "Error al enviar el pedido.");
                }

                alert("✅ ¡Pedido enviado! Prepárate para tus dulces.");

                carrito = [];
                actualizarUI();
                cerrarCheckout();
                resetFormulario();
                location.reload();
            })
            .catch((err) => {
                console.error("Error enviando pedido:", err);
                alert(`❌ ${err.message}`);
            })
            .finally(() => {
                estaEnviando = false;
                btn.innerText = "¡ENVIAR PEDIDO!";
                btn.classList.remove('opacity-50');
            });
        }
    </script>
</body>
</html>
