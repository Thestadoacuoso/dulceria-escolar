<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sugar Dash | Carrito Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        :root{
            --sd-orange-1:#ff9a3c;
            --sd-orange-2:#ff7a1a;
            --sd-orange-3:#ffb76b;
            --sd-blue-1:#173b78;
            --sd-blue-2:#2457a6;
            --sd-blue-3:#eaf2ff;
            --sd-cream:#fffaf4;
            --sd-line:#ffc98a;
            --sd-line-strong:#ffb35c;
            --sd-text:#183153;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 183, 107, 0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(36, 87, 166, 0.10), transparent 24%),
                linear-gradient(180deg, #ffffff 0%, #fffaf4 100%);
            color: var(--sd-text);
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--sd-line);
            box-shadow: 0 8px 24px rgba(255, 179, 92, 0.10);
        }

        .header-hidden {
            transform: translateY(-100%);
        }

        .product-card {
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.28s ease;
            background: rgba(255,255,255,0.97);
            border: 2px solid var(--sd-line);
            box-shadow: 0 12px 28px rgba(255, 122, 26, 0.10);
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 38px rgba(255, 122, 26, 0.18);
            border-color: var(--sd-line-strong);
        }

        .btn-float {
            animation: slideUp 0.3s ease-out;
        }

        .hero-card {
            background: linear-gradient(135deg, var(--sd-orange-2) 0%, var(--sd-orange-1) 55%, #ffbe73 100%);
            box-shadow: 0 18px 40px rgba(255, 122, 26, 0.28);
            border: 2px solid rgba(255,255,255,0.16);
        }

        .btn-add {
            background: linear-gradient(135deg, var(--sd-blue-1) 0%, var(--sd-blue-2) 100%);
            box-shadow: 0 10px 20px rgba(36, 87, 166, 0.22);
            transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-add:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .btn-cart {
            background: linear-gradient(135deg, var(--sd-orange-2) 0%, var(--sd-orange-1) 100%);
            box-shadow: 0 18px 34px rgba(255, 122, 26, 0.30);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--sd-orange-2) 0%, var(--sd-orange-1) 100%);
            box-shadow: 0 14px 28px rgba(255, 122, 26, 0.24);
            transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
        }

        .btn-primary:hover {
            filter: brightness(1.04);
        }

        .price-text {
            color: var(--sd-blue-1);
        }

        .soft-input {
            background: #fffaf6;
            border: 2px solid var(--sd-line);
            color: var(--sd-text);
        }

        .soft-input:focus {
            border-color: var(--sd-orange-1);
            box-shadow: 0 0 0 4px rgba(255, 154, 60, 0.12);
        }

        .checkout-item {
            background: #fffaf6;
            border: 2px solid var(--sd-line);
        }

        .payment-active {
            border-color: var(--sd-orange-1) !important;
            background: #fff2e4 !important;
            color: var(--sd-orange-2) !important;
        }

        .modal-panel {
            transform: translateY(22px) scale(0.96);
            opacity: 0;
            transition: transform 0.28s ease, opacity 0.28s ease;
        }

        .modal-panel.show {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .modal-backdrop {
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .modal-backdrop.show {
            opacity: 1;
        }

        .bump {
            animation: bump 0.35s ease;
        }

        .cart-bounce {
            animation: cartBounce 0.45s ease;
        }

        .fly-target-pulse {
            animation: flyTargetPulse 0.45s ease;
        }

        .add-feedback {
            position: absolute;
            right: 1rem;
            top: 0.2rem;
            background: linear-gradient(135deg, #ff7a1a, #ff9a3c);
            color: white;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 999px;
            pointer-events: none;
            animation: floatUpFade 0.7s ease forwards;
            box-shadow: 0 8px 18px rgba(255, 122, 26, 0.25);
        }

        .fly-clone {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            min-width: 72px;
            max-width: 140px;
            padding: 8px 12px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--sd-orange-2) 0%, var(--sd-orange-1) 100%);
            color: white;
            font-weight: 800;
            font-size: 12px;
            text-align: center;
            box-shadow: 0 14px 30px rgba(255, 122, 26, 0.28);
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            will-change: left, top, transform, opacity;
        }

        .cart-visible {
            display: block !important;
            animation: cartReveal 0.35s ease;
        }

        .removing-item {
            animation: removeItem 0.28s ease forwards;
            overflow: hidden;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 999px;
            display: inline-block;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        .cart-icon {
            filter: drop-shadow(0 4px 10px rgba(255,122,26,0.20));
            transform-origin: center;
        }

        .cart-icon-bounce {
            animation: cartIconBounce 0.55s ease;
        }

        .cart-icon-wiggle {
            animation: cartIconWiggle 0.4s ease;
        }

        .cart-button-pulse {
            animation: cartButtonPulse 0.45s ease;
        }

        .cart-count-bubble {
            position: absolute;
            top: -7px;
            right: -9px;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            border-radius: 999px;
            background: #ef4444;
            color: white;
            font-size: 11px;
            font-weight: 800;
            line-height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 6px 14px rgba(239, 68, 68, 0.35);
            border: 2px solid white;
            transform-origin: center;
        }

        .cart-count-bubble.bump {
            animation: bubblePop 0.42s ease;
        }

        .confetti-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 80;
        }

        .confetti-dot {
            position: absolute;
            top: -18px;
            width: 10px;
            height: 10px;
            border-radius: 999px;
            opacity: 0.95;
            animation: confettiFall linear forwards;
            will-change: transform, opacity;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes bump {
            0% { transform: scale(1); }
            40% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        @keyframes cartBounce {
            0% { transform: translateY(0); }
            35% { transform: translateY(-8px); }
            60% { transform: translateY(3px); }
            100% { transform: translateY(0); }
        }

        @keyframes flyTargetPulse {
            0% { transform: scale(1); }
            35% { transform: scale(1.10); }
            70% { transform: scale(0.96); }
            100% { transform: scale(1); }
        }

        @keyframes floatUpFade {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-24px) scale(1); opacity: 0; }
        }

        @keyframes cartReveal {
            0% {
                opacity: 0;
                transform: translateY(24px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes removeItem {
            0% {
                opacity: 1;
                transform: translateX(0) scale(1);
                max-height: 100px;
                margin-bottom: 0.75rem;
            }
            100% {
                opacity: 0;
                transform: translateX(30px) scale(0.96);
                max-height: 0;
                margin-bottom: 0;
                padding-top: 0;
                padding-bottom: 0;
                border-width: 0;
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes cartIconBounce {
            0% { transform: scale(1) rotate(0deg); }
            20% { transform: scale(1.16) rotate(-5deg); }
            45% { transform: scale(0.96) rotate(4deg); }
            65% { transform: scale(1.08) rotate(-2deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes cartIconWiggle {
            0% { transform: translateX(0); }
            20% { transform: translateX(-2px) rotate(-3deg); }
            40% { transform: translateX(2px) rotate(3deg); }
            60% { transform: translateX(-1px) rotate(-2deg); }
            80% { transform: translateX(1px) rotate(2deg); }
            100% { transform: translateX(0) rotate(0deg); }
        }

        @keyframes cartButtonPulse {
            0% { transform: translateY(0) scale(1); }
            35% { transform: translateY(-4px) scale(1.02); }
            65% { transform: translateY(2px) scale(0.995); }
            100% { transform: translateY(0) scale(1); }
        }

        @keyframes bubblePop {
            0% { transform: scale(0.85); }
            40% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes confettiFall {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translate3d(var(--drift, 0px), 105vh, 0) scale(0.9);
                opacity: 0.95;
            }
        }
    </style>
</head>

<body class="min-h-screen">

    <div id="mainHeader" class="sticky top-0 z-40 glass px-6 py-1 transition-transform duration-300">
        <div class="max-w-md mx-auto flex justify-center items-center">
            <div class="text-center w-full">
                <img
                    src="/static/logo_sugar.png"
                    alt="Sugar Dash"
                    class="h-[200px] mx-auto object-contain mb-[-36px] drop-shadow-md transition duration-300 ease-in-out hover:scale-105"
                >
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.18em] mt-0">
                    • Biomédica Express •
                </p>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-6 pb-32">
        <div class="hero-card rounded-3xl p-6 mb-8 text-white relative overflow-hidden">
            <div class="absolute -right-8 -top-8 w-28 h-28 rounded-full bg-white/10"></div>
            <div class="absolute right-8 bottom-0 w-20 h-20 rounded-full bg-white/10"></div>
            <div class="relative z-10">
                <h2 class="text-xl font-extrabold mb-1">¿Qué se te antoja? 🍬</h2>
                <p class="text-white/90 text-sm">Arma tu carrito y te lo llevo a tu salón.</p>
            </div>
        </div>

        <div class="grid gap-4">
            {% for p in productos %}
            <div class="product-card p-4 rounded-[2rem] flex items-center justify-between {{ 'opacity-50 grayscale pointer-events-none' if not p.disponible }}">
                <div class="flex-1 pr-4">
                    <h3 class="font-bold text-slate-800 text-lg leading-tight">{{ p.nombre }}</h3>
                    <p class="price-text font-extrabold text-xl mt-1">${{ p.precio }}</p>
                </div>

                {% if p.disponible %}
                <button
                    onclick='prepararItem({{ p.nombre|tojson }}, {{ p.precio|tojson }}, {{ p.sabores|tojson }}, this)'
                    class="btn-add text-white px-5 py-3 rounded-2xl font-bold text-sm active:scale-95">
                    + Añadir
                </button>
                {% else %}
                <span class="text-rose-500 font-bold text-sm px-4 py-2">Agotado</span>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </main>

  <div id="btnVerCarrito" class="fixed bottom-6 left-0 right-0 px-6 z-40 hidden btn-float">
    <button id="cartButton" onclick="abrirCheckout()" class="btn-cart max-w-md mx-auto w-full text-white py-5 rounded-[2rem] font-black text-lg flex justify-center items-center gap-3 px-8 active:scale-95">
        <span class="flex items-center gap-3">
            <span class="relative inline-flex items-center justify-center">
                <img id="cartIcon" src="/static/cart.png" alt="Carrito" class="w-8 h-8 object-contain cart-icon">
                <span id="cartCountBubble" class="cart-count-bubble hidden">0</span>
            </span>
            <span>VER CARRITO</span>
        </span>
    </button>
</div>

    <div id="modalSabor" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div id="backdropSabor" class="absolute inset-0 bg-slate-900/55 backdrop-blur-sm modal-backdrop" onclick="cerrarModalSabor()"></div>
        <div id="panelSabor" class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 relative z-10 shadow-2xl border-2 border-[var(--sd-line)] modal-panel">
            <h3 id="saborTitulo" class="text-2xl font-black text-slate-800 mb-4 text-center">Elegir Sabor</h3>
            <select id="selectSabor" class="soft-input w-full p-4 rounded-2xl outline-none font-semibold mb-6">
                <option value="">Selecciona sabor...</option>
            </select>
            <button onclick="confirmarAñadir()" class="btn-primary w-full text-white py-4 rounded-2xl font-bold text-lg">
                Agregar al Carrito
            </button>
        </div>
    </div>

    <div id="modalCheckout" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center p-4">
        <div id="backdropCheckout" class="absolute inset-0 bg-slate-900/55 backdrop-blur-sm modal-backdrop" onclick="cerrarCheckout()"></div>
        <div id="panelCheckout" class="bg-white w-full max-w-md rounded-[2.5rem] p-8 relative z-10 shadow-2xl overflow-y-auto max-h-[90vh] border-2 border-[var(--sd-line)] modal-panel">
            <div class="w-12 h-1.5 bg-orange-100 rounded-full mx-auto mb-6"></div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">Tu Pedido</h3>

            <div id="listaCarrito" class="mb-6 space-y-3 border-b-2 border-[var(--sd-line)] pb-4"></div>
            <p id="totalCheckout" class="price-text font-black text-xl mb-6 text-right"></p>

            <div class="space-y-4">
                <input
                    type="text"
                    id="inputNombre"
                    placeholder="Tu Nombre"
                    class="soft-input w-full p-4 rounded-2xl outline-none font-semibold"
                >

                <input
                    type="text"
                    id="inputPunto"
                    placeholder="Punto de entrega (Ej: Salón 201)"
                    class="soft-input w-full p-4 rounded-2xl outline-none font-semibold"
                >

                <input
                    type="text"
                    id="inputDescripcion"
                    placeholder="¿Cómo te reconozco? (Ej: Gorra roja, sudadera negra)"
                    class="soft-input w-full p-4 rounded-2xl outline-none font-semibold"
                >

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setPago('Efectivo 💵', this)" class="pago-btn p-4 border-2 border-[var(--sd-line)] rounded-2xl font-bold text-sm text-slate-500 bg-white transition">
                        Efectivo
                    </button>
                    <button onclick="setPago('Transferencia 📱', this)" class="pago-btn p-4 border-2 border-[var(--sd-line)] rounded-2xl font-bold text-sm text-slate-500 bg-white transition">
                        Transferencia
                    </button>
                </div>

                <button id="btnFinalizar" onclick="enviarTodo()" class="btn-primary w-full text-white py-4 rounded-2xl font-black text-lg transition">
                    ¡ENVIAR PEDIDO!
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-24 z-[60] hidden">
        <div id="toastBox" class="bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-2xl text-sm font-bold opacity-0 translate-y-4 transition-all duration-300">
            Mensaje
        </div>
    </div>

    <div id="confettiLayer" class="confetti-layer"></div>

    <script>
        let carrito = [];
        let itemPendiente = null;
        let metodoPago = '';
        let estaEnviando = false;

        function mostrarModal(modalId, backdropId, panelId) {
            const modal = document.getElementById(modalId);
            const backdrop = document.getElementById(backdropId);
            const panel = document.getElementById(panelId);

            modal.classList.remove('hidden');

            requestAnimationFrame(() => {
                backdrop.classList.add('show');
                panel.classList.add('show');
            });
        }

        function ocultarModal(modalId, backdropId, panelId, limpiar = null) {
            const modal = document.getElementById(modalId);
            const backdrop = document.getElementById(backdropId);
            const panel = document.getElementById(panelId);

            backdrop.classList.remove('show');
            panel.classList.remove('show');

            setTimeout(() => {
                modal.classList.add('hidden');
                if (typeof limpiar === 'function') limpiar();
            }, 260);
        }

        function mostrarToast(msg, tipo = 'ok') {
            const toast = document.getElementById('toast');
            const box = document.getElementById('toastBox');

            box.textContent = msg;
            box.className = 'px-5 py-3 rounded-2xl shadow-2xl text-sm font-bold opacity-0 translate-y-4 transition-all duration-300';

            if (tipo === 'ok') {
                box.classList.add('bg-slate-900', 'text-white');
            } else {
                box.classList.add('bg-rose-600', 'text-white');
            }

            toast.classList.remove('hidden');

            requestAnimationFrame(() => {
                box.classList.remove('opacity-0', 'translate-y-4');
            });

            setTimeout(() => {
                box.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 1800);
        }

        function lanzarConfeti(cantidad = 55) {
            const layer = document.getElementById('confettiLayer');
            if (!layer) return;

            const colores = ['#ff7a1a', '#ff9a3c', '#ffb76b', '#173b78', '#2457a6', '#ef4444', '#ffffff'];

            for (let i = 0; i < cantidad; i++) {
                const dot = document.createElement('span');
                const size = Math.random() * 8 + 6;
                const left = Math.random() * 100;
                const duration = Math.random() * 1.6 + 2.2;
                const delay = Math.random() * 0.35;
                const drift = (Math.random() - 0.5) * 180;
                const color = colores[Math.floor(Math.random() * colores.length)];

                dot.className = 'confetti-dot';
                dot.style.left = `${left}vw`;
                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                dot.style.background = color;
                dot.style.animationDuration = `${duration}s`;
                dot.style.animationDelay = `${delay}s`;
                dot.style.setProperty('--drift', `${drift}px`);

                layer.appendChild(dot);

                setTimeout(() => {
                    dot.remove();
                }, (duration + delay) * 1000 + 300);
            }
        }

        function animarFeedbackAgregar(boton) {
            if (!boton) return;

            boton.classList.remove('bump');
            void boton.offsetWidth;
            boton.classList.add('bump');

            const contenedor = boton.closest('.product-card');
            if (!contenedor) return;

            contenedor.style.position = 'relative';

            const badge = document.createElement('div');
            badge.className = 'add-feedback';
            badge.textContent = '+1';
            contenedor.appendChild(badge);

            setTimeout(() => badge.remove(), 700);
        }

        function animarVueloAlCarrito(boton, nombreProducto = '+1') {
            if (!boton) return;

            const carritoContenedor = document.getElementById('btnVerCarrito');
            const carritoBoton = document.getElementById('cartButton');

            if (!carritoContenedor || !carritoBoton) return;

            carritoContenedor.classList.remove('hidden');

            const origenRect = boton.getBoundingClientRect();
            const destinoRect = carritoBoton.getBoundingClientRect();

            const startX = origenRect.left + origenRect.width / 2;
            const startY = origenRect.top + origenRect.height / 2;

            const endX = destinoRect.left + destinoRect.width - 42;
            const endY = destinoRect.top + destinoRect.height / 2;

            const clone = document.createElement('div');
            clone.className = 'fly-clone';
            clone.textContent = nombreProducto.length > 16 ? nombreProducto.slice(0, 16) + '…' : nombreProducto;
            clone.style.left = `${startX}px`;
            clone.style.top = `${startY}px`;
            document.body.appendChild(clone);

            const duration = 700;
            const startTime = performance.now();

            function easeInOutCubic(t) {
                return t < 0.5
                    ? 4 * t * t * t
                    : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }

            function animate(now) {
                const elapsed = now - startTime;
                const raw = Math.min(elapsed / duration, 1);
                const t = easeInOutCubic(raw);

                const x = startX + (endX - startX) * t;

                const controlLift = -120;
                const y =
                    (1 - t) * (1 - t) * startY +
                    2 * (1 - t) * t * (Math.min(startY, endY) + controlLift) +
                    t * t * endY;

                const scale = 1 - 0.55 * t;
                const opacity = 1 - 0.15 * t;

                clone.style.left = `${x}px`;
                clone.style.top = `${y}px`;
                clone.style.opacity = `${opacity}`;
                clone.style.transform = `translate(-50%, -50%) scale(${scale})`;

                if (raw < 1) {
                    requestAnimationFrame(animate);
                } else {
                    clone.remove();

                    carritoBoton.classList.remove('fly-target-pulse', 'cart-bounce');
                    void carritoBoton.offsetWidth;
                    carritoBoton.classList.add('fly-target-pulse', 'cart-bounce');

                    setTimeout(() => {
                        carritoBoton.classList.remove('fly-target-pulse', 'cart-bounce');
                    }, 450);
                }
            }

            requestAnimationFrame(animate);
        }

        function animarCarritoIcono() {
            const icon = document.getElementById("cartIcon");
            const cartButton = document.getElementById("cartButton");
            const bubble = document.getElementById("cartCountBubble");

            if (icon) {
                icon.classList.remove("cart-icon-bounce", "cart-icon-wiggle");
                void icon.offsetWidth;
                icon.classList.add("cart-icon-bounce", "cart-icon-wiggle");

                setTimeout(() => {
                    icon.classList.remove("cart-icon-bounce", "cart-icon-wiggle");
                }, 550);
            }

            if (cartButton) {
                cartButton.classList.remove("cart-button-pulse");
                void cartButton.offsetWidth;
                cartButton.classList.add("cart-button-pulse");

                setTimeout(() => {
                    cartButton.classList.remove("cart-button-pulse");
                }, 450);
            }

            if (bubble && !bubble.classList.contains("hidden")) {
                bubble.classList.remove("bump");
                void bubble.offsetWidth;
                bubble.classList.add("bump");

                setTimeout(() => {
                    bubble.classList.remove("bump");
                }, 420);
            }

            if (navigator.vibrate) {
                navigator.vibrate([25, 20, 35]);
            }
        }

        function animarAgregarCompleto(boton, nombreProducto = '+1') {
            animarFeedbackAgregar(boton);
            animarVueloAlCarrito(boton, nombreProducto);
            animarCarritoIcono();
        }

        function prepararItem(nombre, precio, sabores, boton = null) {
            itemPendiente = {
                nombre: nombre,
                precio: Number(precio) || 0,
                sabores: Array.isArray(sabores) ? sabores.filter(s => String(s).trim() !== '') : [],
                botonOrigen: boton
            };

            if (itemPendiente.sabores.length > 0) {
                const select = document.getElementById('selectSabor');
                const titulo = document.getElementById('saborTitulo');

                titulo.innerText = `Elegir sabor de ${itemPendiente.nombre}`;
                select.innerHTML = '<option value="">Selecciona sabor...</option>';

                itemPendiente.sabores.forEach(sabor => {
                    const option = document.createElement('option');
                    option.value = sabor;
                    option.textContent = sabor;
                    select.appendChild(option);
                });

                mostrarModal('modalSabor', 'backdropSabor', 'panelSabor');
            } else {
                carrito.push({
                    nombre: itemPendiente.nombre,
                    precio: itemPendiente.precio
                });

                actualizarUI();
                animarAgregarCompleto(itemPendiente.botonOrigen, itemPendiente.nombre);
            }
        }

        function confirmarAñadir() {
            if (!itemPendiente) return;

            const select = document.getElementById('selectSabor');
            const sabor = select.value;
            const tieneSabores = Array.isArray(itemPendiente.sabores) && itemPendiente.sabores.length > 0;

            if (tieneSabores && !sabor) {
                mostrarToast("⚠️ Por favor elige un sabor.", "error");
                return;
            }

            const nombreFinal = sabor
                ? `${itemPendiente.nombre} (${sabor})`
                : itemPendiente.nombre;

            carrito.push({
                nombre: nombreFinal,
                precio: itemPendiente.precio
            });

            actualizarUI();
            cerrarModalSabor();
            animarAgregarCompleto(itemPendiente.botonOrigen, nombreFinal);
        }

        function eliminarDelCarrito(index) {
            const items = document.querySelectorAll('.checkout-row');
            const itemEl = items[index];

            if (itemEl) {
                itemEl.classList.add('removing-item');
                setTimeout(() => {
                    carrito.splice(index, 1);
                    actualizarUI();

                    if (carrito.length === 0) {
                        cerrarCheckout();
                        return;
                    }

                    abrirCheckout();
                }, 260);
            } else {
                carrito.splice(index, 1);
                actualizarUI();

                if (carrito.length === 0) {
                    cerrarCheckout();
                    return;
                }

                abrirCheckout();
            }
        }

        function actualizarUI() {
            const btn = document.getElementById('btnVerCarrito');
            const badge = document.getElementById('badgeCarrito');
            const bubble = document.getElementById('cartCountBubble');

            if (carrito.length > 0) {
                if (btn.classList.contains('hidden')) {
                    btn.classList.remove('hidden');
                    btn.classList.add('cart-visible');
                    setTimeout(() => btn.classList.remove('cart-visible'), 400);
                }

                badge.innerText = carrito.length;

                if (bubble) {
                    bubble.innerText = carrito.length;
                    bubble.classList.remove('hidden');
                }
            } else {
                btn.classList.add('hidden');
                badge.innerText = '0';

                if (bubble) {
                    bubble.innerText = '0';
                    bubble.classList.add('hidden');
                }
            }
        }

        function abrirCheckout() {
            if (carrito.length === 0) return;

            const lista = document.getElementById('listaCarrito');
            const totalTxt = document.getElementById('totalCheckout');
            let total = 0;

            lista.innerHTML = "";

            carrito.forEach((item, index) => {
                const precio = Number(item.precio) || 0;
                total += precio;

                lista.innerHTML += `
                    <div class="checkout-item checkout-row flex justify-between items-center p-3 rounded-xl">
                        <div class="flex-1">
                            <p class="font-bold text-slate-800 text-sm">${item.nombre}</p>
                            <p class="price-text font-bold text-xs">$${precio}</p>
                        </div>
                        <button onclick="eliminarDelCarrito(${index})" class="text-rose-500 p-2 hover:bg-rose-50 rounded-lg transition" title="Eliminar">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                `;
            });

            totalTxt.innerText = `Total: $${total}`;
            mostrarModal('modalCheckout', 'backdropCheckout', 'panelCheckout');
        }

        function cerrarModalSabor() {
            ocultarModal('modalSabor', 'backdropSabor', 'panelSabor', () => {
                document.getElementById('selectSabor').innerHTML = '<option value="">Selecciona sabor...</option>';
                itemPendiente = null;
            });
        }

        function cerrarCheckout() {
            ocultarModal('modalCheckout', 'backdropCheckout', 'panelCheckout');
        }

        function setPago(metodo, btn) {
            metodoPago = metodo;

            document.querySelectorAll('.pago-btn').forEach(b => {
                b.classList.remove('payment-active');
                b.classList.add('text-slate-500');
            });

            btn.classList.remove('text-slate-500');
            btn.classList.add('payment-active');
        }

        function resetFormulario() {
            document.getElementById('inputNombre').value = '';
            document.getElementById('inputPunto').value = '';
            document.getElementById('inputDescripcion').value = '';
            metodoPago = '';

            document.querySelectorAll('.pago-btn').forEach(b => {
                b.classList.remove('payment-active');
                b.classList.add('text-slate-500');
            });
        }

        function enviarTodo() {
            if (estaEnviando || carrito.length === 0) return;

            const nombre = document.getElementById('inputNombre').value.trim();
            const punto = document.getElementById('inputPunto').value.trim();
            const desc = document.getElementById('inputDescripcion').value.trim();
            const btn = document.getElementById('btnFinalizar');

            if (!nombre || !punto || !metodoPago) {
                mostrarToast("⚠️ Completa tu nombre, punto de entrega y método de pago.", "error");
                return;
            }

            estaEnviando = true;
            btn.innerHTML = '<span class="spinner mr-2"></span> PROCESANDO...';
            btn.classList.add('opacity-50', 'pointer-events-none');

            fetch('/enviar_pedido', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    nombre_cliente: nombre,
                    productos: carrito,
                    punto: punto,
                    descripcion: desc || "Sin descripción física",
                    metodo_pago: metodoPago,
                    total: carrito.reduce((acc, item) => acc + (Number(item.precio) || 0), 0)
                })
            })
            .then(async (res) => {
                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    throw new Error(data.error || "Error al enviar el pedido.");
                }

                lanzarConfeti(60);
                mostrarToast("✅ ¡Pedido enviado! Prepárate para tus dulces.", "ok");

                carrito = [];
                actualizarUI();
                cerrarCheckout();
                resetFormulario();

                setTimeout(() => {
                    location.reload();
                }, 1400);
            })
            .catch((err) => {
                console.error("Error enviando pedido:", err);
                mostrarToast(`❌ ${err.message}`, "error");
            })
            .finally(() => {
                estaEnviando = false;
                btn.innerHTML = '¡ENVIAR PEDIDO!';
                btn.classList.remove('opacity-50', 'pointer-events-none');
            });
        }

        let lastScrollY = window.scrollY;
        const header = document.getElementById('mainHeader');
        const threshold = 10;

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;

            if (currentScrollY <= 10) {
                header.classList.remove('header-hidden');
            } else if (currentScrollY > lastScrollY + threshold) {
                header.classList.add('header-hidden');
            } else if (currentScrollY < lastScrollY - threshold) {
                header.classList.remove('header-hidden');
            }

            lastScrollY = currentScrollY;
        });
    </script>
</body>
</html>
